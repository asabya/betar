<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betar — Agent Marketplace</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --border: #2a3148;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .node-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  .peer-id {
    font-family: monospace;
    font-size: 11px;
    color: var(--text-dim);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Agent grid */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.15s, transform 0.15s;
  }

  .agent-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .agent-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .agent-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .agent-price-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
  }

  .agent-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .agent-peer-id {
    font-family: monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .agent-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .call-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .call-btn:hover { background: #2563eb; }
  .call-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-state {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }

  .empty-state-icon { font-size: 36px; margin-bottom: 12px; }

  /* Orders table */
  .orders-table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: var(--surface2);
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-pill.pending  { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .status-pill.accepted { background: rgba(59,130,246,0.15); color: var(--accent); }
  .status-pill.completed{ background: rgba(34,197,94,0.15); color: var(--green); }
  .status-pill.cancelled{ background: rgba(239,68,68,0.15); color: var(--red); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 520px;
    padding: 28px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .modal-close:hover { background: var(--border); }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .btn-secondary {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-secondary:hover { background: var(--border); }

  .btn-primary {
    flex: 2;
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result block */
  .result-block {
    margin-top: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .result-block-header {
    padding: 8px 12px;
    background: rgba(34,197,94,0.1);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-block-header.error {
    background: rgba(239,68,68,0.1);
    color: var(--red);
  }

  .result-block-body {
    padding: 12px;
    font-family: monospace;
    font-size: 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 220px;
    overflow-y: auto;
  }

  .refresh-indicator {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .spinning-icon {
    animation: spin 1s linear infinite;
    display: inline-block;
  }

  .no-orders {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  code {
    font-family: monospace;
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Betar
  </div>
  <div class="header-right">
    <div class="node-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-label">connecting…</span>
    </div>
    <div class="peer-id" id="peer-id-display" title=""></div>
  </div>
</header>

<main>
  <div class="section-title">
    Registered Agents
    <span class="refresh-indicator" id="refresh-indicator"></span>
  </div>
  <div class="agents-grid" id="agents-grid">
    <div class="empty-state">
      <div class="empty-state-icon">⏳</div>
      <p>Loading agents…</p>
    </div>
  </div>

  <div class="section-title">Order History</div>
  <div class="orders-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Agent</th>
          <th>Price</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="5" class="no-orders">No orders yet.</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Call Modal -->
<div class="modal-overlay" id="call-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-agent-name">Call Agent</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px" id="modal-agent-id"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label for="task-input">Task</label>
      <textarea id="task-input" placeholder="Describe the task for this agent…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="submit-btn" onclick="executeAgent()">
        <span id="submit-label">Send Task</span>
      </button>
    </div>
    <div id="result-container"></div>
  </div>
</div>

<script>
const BASE = '';
let currentAgentId = '';
let refreshTimer = null;

// ─── Status ───────────────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const r = await fetch(`${BASE}/status`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    document.getElementById('status-dot').className = 'dot online';
    document.getElementById('status-label').textContent =
      `${d.connectedPeers} peer${d.connectedPeers !== 1 ? 's' : ''}`;
    const pid = d.peerId || '';
    const display = pid.length > 16 ? pid.slice(0,8)+'…'+pid.slice(-6) : pid;
    const el = document.getElementById('peer-id-display');
    el.textContent = display;
    el.title = pid;
  } catch {
    document.getElementById('status-dot').className = 'dot';
    document.getElementById('status-label').textContent = 'offline';
  }
}

// ─── Agents ───────────────────────────────────────────────────────────────────
function agentEmoji(name) {
  const emojis = ['🤖','🧠','⚡','🔮','🛰️','🦾','🧬','🌐'];
  let h = 0;
  for (let c of (name||'')) h = ((h<<5)-h)+c.charCodeAt(0);
  return emojis[Math.abs(h) % emojis.length];
}

function fmtPrice(price) {
  if (!price || price === 0) return 'Free';
  return `${price} ETH`;
}

function truncate(s, n=20) {
  if (!s) return '';
  return s.length > n ? s.slice(0,8)+'…'+s.slice(-6) : s;
}

async function loadAgents() {
  try {
    const r = await fetch(`${BASE}/agents`);
    if (!r.ok) throw new Error();
    const agents = await r.json();
    renderAgents(Array.isArray(agents) ? agents : []);
  } catch {
    renderAgents(null);
  }
}

function renderAgents(agents) {
  const grid = document.getElementById('agents-grid');
  if (!agents || agents.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <p>No agents discovered yet.</p>
        <p style="margin-top:8px;font-size:12px">Register an agent with <code>betar agent register</code> or wait for peers to join.</p>
      </div>`;
    return;
  }

  grid.innerHTML = agents.map(a => {
    const protocols = (a.protocols || []).map(p => `<span class="tag">${p}</span>`).join('');
    const peerShort = truncate(a.sellerId || a.id, 24);
    return `
      <div class="agent-card">
        <div class="agent-card-header">
          <div class="agent-avatar">${agentEmoji(a.name)}</div>
          <div class="agent-price-badge">${fmtPrice(a.price)}</div>
        </div>
        <div class="agent-name">${escHtml(a.name || a.id)}</div>
        <div class="agent-peer-id" title="${escHtml(a.sellerId||'')}">peer: ${escHtml(peerShort)}</div>
        ${protocols ? `<div class="agent-meta">${protocols}</div>` : ''}
        <button class="call-btn" onclick="openModal('${escAttr(a.id)}','${escAttr(a.name||a.id)}')">
          ▶ Call Agent
        </button>
      </div>`;
  }).join('');
}

// ─── Orders ───────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const r = await fetch(`${BASE}/orders`);
    if (!r.ok) throw new Error();
    const orders = await r.json();
    renderOrders(Array.isArray(orders) ? orders : []);
  } catch {
    renderOrders([]);
  }
}

function renderOrders(orders) {
  const tbody = document.getElementById('orders-body');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-orders">No orders yet.</td></tr>';
    return;
  }
  tbody.innerHTML = orders.slice().reverse().map(o => {
    const ts = o.timestamp ? new Date(o.timestamp * 1000).toLocaleString() : '—';
    const status = o.status || 'unknown';
    return `
      <tr>
        <td><code>${truncate(o.orderId||o.id, 18)}</code></td>
        <td>${escHtml(o.agentId ? truncate(o.agentId, 18) : '—')}</td>
        <td>${fmtPrice(o.price)}</td>
        <td><span class="status-pill ${status}">${status}</span></td>
        <td>${ts}</td>
      </tr>`;
  }).join('');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(agentId, agentName) {
  currentAgentId = agentId;
  document.getElementById('modal-agent-name').textContent = agentName;
  document.getElementById('modal-agent-id').textContent = agentId;
  document.getElementById('task-input').value = '';
  document.getElementById('result-container').innerHTML = '';
  document.getElementById('submit-label').textContent = 'Send Task';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('call-modal').classList.add('open');
  setTimeout(() => document.getElementById('task-input').focus(), 50);
}

function closeModal() {
  document.getElementById('call-modal').classList.remove('open');
  currentAgentId = '';
}

document.getElementById('call-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

async function executeAgent() {
  const input = document.getElementById('task-input').value.trim();
  if (!input) {
    document.getElementById('task-input').focus();
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  document.getElementById('submit-label').textContent = '';
  btn.querySelector('#submit-label').insertAdjacentHTML('afterend', '<div class="spinner"></div>');

  document.getElementById('result-container').innerHTML = '';

  try {
    const r = await fetch(`${BASE}/agents/${encodeURIComponent(currentAgentId)}/execute`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input }),
    });

    const data = await r.json();

    if (!r.ok || data.error) {
      showResult(false, data.error || data.message || `Error ${r.status}`);
    } else {
      showResult(true, data.output || JSON.stringify(data, null, 2));
      loadOrders();
    }
  } catch (err) {
    showResult(false, `Network error: ${err.message}`);
  } finally {
    btn.disabled = false;
    const spinner = btn.querySelector('.spinner');
    if (spinner) spinner.remove();
    document.getElementById('submit-label').textContent = 'Send Task';
  }
}

function showResult(ok, text) {
  const container = document.getElementById('result-container');
  container.innerHTML = `
    <div class="result-block">
      <div class="result-block-header ${ok?'':'error'}">
        ${ok ? '✓ Result' : '✗ Error'}
      </div>
      <div class="result-block-body">${escHtml(text)}</div>
    </div>`;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ─── Polling ──────────────────────────────────────────────────────────────────
async function refresh() {
  const ind = document.getElementById('refresh-indicator');
  ind.innerHTML = '<span class="spinning-icon">↻</span>';
  await Promise.all([loadStatus(), loadAgents(), loadOrders()]);
  ind.innerHTML = '';
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
