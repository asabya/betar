# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: betar

env:
  - NODE_ENV=production

before:
  hooks:
    - go mod tidy
    - sh -c 'cd web && rm -rf node_modules && npm install && VITE_API_URL="" npm run build && rm -rf ../cmd/betar/dashboard/dist && cp -r dist ../cmd/betar/dashboard/dist'

builds:
  - id: betar
    main: ./cmd/betar
    binary: betar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: betar
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if eq .Os \"windows\" }}.exe{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: asabya
    name: betar
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
